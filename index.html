<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="ogjePQATvJDJiCr3RVtsD5VqTlTnyGhCA1IT7BFr6GQ" />
  <title>ENTAME REVIEW — 漫画・アニメ・映画・ドラマ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="sidebar">
    <div class="sidebar-logo"><a href="index.html">ENTAME<span class="logo-accent">REVIEW</span></a></div>
    <div class="sidebar-items">
      <a href="index.html" class="sidebar-item admin-only" id="sideWriteBtn">
        <span class="sidebar-icon">✏️</span>
        <span class="sidebar-text">あなたのレビューを投稿</span>
      </a>
      <a href="index.html" class="sidebar-item" id="sideDiagBtn">
        <span class="sidebar-icon">🎯</span>
        <span class="sidebar-text">あなたにぴったりの作品を探す</span>
      </a>
      <a href="reviews.html" class="sidebar-item">
        <span class="sidebar-icon">💬</span>
        <span class="sidebar-text">みんなのレビュー</span>
      </a>
      <a href="blog.html" class="sidebar-item">
        <span class="sidebar-icon">📝</span>
        <span class="sidebar-text">コラム・考察を読む</span>
      </a>
      <a href="osusume.html" class="sidebar-item">
        <span class="sidebar-icon">👑</span>
        <span class="sidebar-text">管理人が厳選した作品</span>
      </a>
      <a href="ranking.html" class="sidebar-item">
        <span class="sidebar-icon">🏆</span>
        <span class="sidebar-text">いいねランキング</span>
      </a>
      <a href="actor.html" class="sidebar-item">
        <span class="sidebar-icon">🎭</span>
        <span class="sidebar-text">お気に入りの俳優を探す</span>
      </a>
    </div>
    <div class="sidebar-counts">
      <span class="sidebar-count-badge">❤️ <span id="favNum">0</span></span>
      <span class="sidebar-count-badge">🔖 <span id="wishNum">0</span></span>
    </div>
  </nav>

  <nav class="bottom-tabbar">
    <a href="index.html" class="btab-item"><span class="btab-icon">🏠</span><span>ホーム</span></a>
    <button class="btab-item" id="btabSearchBtn"><span class="btab-icon">🔍</span><span>検索</span></button>
    <button class="btab-item" id="btabWriteBtn"><span class="btab-icon">✏️</span><span>投稿</span></button>
    <a href="osusume.html" class="btab-item"><span class="btab-icon">👑</span><span>おすすめ</span></a>
    <button class="btab-item" id="btabMenuBtn"><span class="btab-icon">☰</span><span>メニュー</span></button>
  </nav>

  <header class="site-header">
    <div class="header-inner">
      <div class="site-logo">ENTAME<span class="logo-accent">REVIEW</span></div>
      <p class="site-tagline">漫画・アニメ・映画・ドラマ のレビューをお届け</p>
    </div>
  </header>

  <!-- 特集バナー -->
  <section class="tokushu-banner" id="tokushuBanner">
    <div class="tokushu-poster-rail-wrap" id="tokushuPosterWrap">
      <div class="tokushu-poster-rail" id="tokushuPosterRail"></div>
    </div>
    <div class="tokushu-inner">
      <div class="tokushu-body">
        <p class="tokushu-label">🎬 特集</p>
        <h2 class="tokushu-title">役所広司特集</h2>
        <p class="tokushu-sub">日本映画界が誇る怪物俳優、その軌跡をたどる</p>
        <a href="special.html" class="tokushu-btn">特集を見る →</a>
      </div>
    </div>
  </section>

  <main>
    <section class="reviews-section">
      <div class="section-inner">
        <div class="filter-bar" id="filterBar">
          <button class="filter-btn active" data-genre="all">すべて</button>
          <button class="filter-btn anime-btn" data-genre="anime">アニメ</button>
          <button class="filter-btn movie-btn" data-genre="movie">映画</button>
          <button class="filter-btn drama-btn" data-genre="drama">ドラマ</button>
          <a href="ranking.html" class="filter-btn rank-btn">ランキング</a>
          <button class="filter-btn fav-tab-btn" data-genre="favorites">お気に入り</button>
          <button class="filter-btn wish-tab-btn" data-genre="wishlist">見たい</button>
        </div>
        <div class="search-bar" id="searchBar">
          <input type="text" id="searchInput" class="search-input" placeholder="タイトル・俳優・監督・声優で検索…">
          <select id="yearSelect" class="year-select">
            <option value="">すべての年</option>
          </select>
        </div>
        <p class="result-count" id="resultCount"></p>
        <div class="review-grid" id="reviewGrid"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 ENTAME REVIEW — すべてのレビューは個人の感想です</p>
  </footer>

  <!-- レビューを書くモーダル -->
  <div id="writeOverlay"></div>
  <div id="writeModal" role="dialog" aria-modal="true">
    <button id="writeClose" aria-label="閉じる">✕</button>
    <div id="writeContent"></div>
  </div>

  <!-- おすすめ診断モーダル -->
  <div id="diagOverlay"></div>
  <div id="diagModal" role="dialog" aria-modal="true">
    <button id="diagClose" aria-label="閉じる">✕</button>
    <div id="diagContent"></div>
  </div>

  <!-- レビュー詳細モーダル -->
  <div id="modalOverlay"></div>
  <div id="modal" role="dialog" aria-modal="true">
    <button id="modalClose" aria-label="閉じる">✕</button>
    <div id="modalContent"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/kuroshiro@1.2.0/dist/kuroshiro.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/kuroshiro-analyzer-kuromoji@1.1.3/dist/kuroshiro-analyzer-kuromoji.min.js"></script>
  <script src="data.js"></script>
  <script src="modal.js"></script>
  <script src="app.js"></script>
  <script src="drawer.js"></script>
</body>
</html>
