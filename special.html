<!DOCTYPE html>

<head>

  <title>役所広司特集 — ENTAME REVIEW</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Special page specific styles */
    .special-hero {
      background: linear-gradient(135deg, #1a0008 0%, #0d0010 50%, #000a1a 100%);
      border-bottom: 1px solid #2a0015;
      overflow: hidden;
    }
    .special-hero-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 32px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
    }
    .special-hero-left { flex: 1; min-width: 0; }
    .special-back {
      display: inline-block;
      color: var(--muted, #888);
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .special-back:hover { color: #fff; }
    .special-hero-label {
      font-size: 0.75rem;
      font-weight: 900;
      color: var(--gold, #ffd84d);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .special-hero-title {
      font-size: 2.8rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 12px;
      line-height: 1.2;
    }
    .special-hero-sub {
      font-size: 1rem;
      color: #ccaaaa;
      line-height: 1.7;
    }

    /* 右側：写真エリア */
    .special-hero-photo-wrap {
      flex-shrink: 0;
      position: relative;
      width: 180px;
      height: 250px;
    }
    .special-hero-photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
      border-radius: 8px;
    }
    /* 左・右・下をヒーロー背景色にフェード */
    .special-hero-photo-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 8px;
      background:
        linear-gradient(to right,  rgba(13, 0, 16, 0.55) 0%, transparent 30%, transparent 60%, rgba(0, 10, 26, 1) 100%),
        linear-gradient(to bottom, transparent 65%, rgba(13, 0, 16, 0.95) 100%);
    }

    .special-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    .special-count {
      font-size: 0.85rem;
      color: var(--muted, #888);
      margin-bottom: 20px;
    }
    .special-loading {
      text-align: center;
      color: var(--muted, #888);
      padding: 60px 20px;
      font-size: 1rem;
    }
    @media (max-width: 620px) {
      .special-hero-inner { padding: 32px 20px 28px; gap: 16px; }
      .special-hero-title { font-size: 1.8rem; }
      .special-hero-sub   { font-size: 0.88rem; }
      .special-hero-photo-wrap { width: 120px; height: 170px; }
    }
  </style>
</head>
